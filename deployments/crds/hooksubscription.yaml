apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hooksubscriptions.kloudlens.io
spec:
  group: kloudlens.io
  scope: Cluster
  names:
    plural: hooksubscriptions
    singular: hooksubscription
    kind: HookSubscription
    shortNames: [hs]
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                nodeSelector:
                  type: object
                  additionalProperties: {type: string}
                subscribe:
                  type: array
                  items: {type: string}
                exclude:
                  type: array
                  items: {type: string}
                preset:
                  type: string
                  enum: [minimal, default, full]
      subresources:
        status: {}
